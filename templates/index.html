<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Phishing Detector</h1>
            <p class="subtitle">Enter a URL to check it with our neural network model.</p>
        </header>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="http://example.com" onkeypress="if(event.key === 'Enter') scan()">
            <button onclick="scan()">Scan URL</button>
        </div>

        <div id="loading" class="loading">analyzing...</div>

        <div id="result">
            <div id="resultLabel" class="label">PHISHING</div>
            <div id="resultConf" class="confidence">Confidence: 98.4%</div>
        </div>
    </div>

    <script>
        async function scan() {
            const urlInput = document.getElementById('urlInput');
            const resultDiv = document.getElementById('result');
            const resultLabel = document.getElementById('resultLabel');
            const resultConf = document.getElementById('resultConf');
            const loading = document.getElementById('loading');

            const url = urlInput.value.trim();
            if (!url) return;

            // reset
            resultDiv.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                    return;
                }

                // set content
                resultLabel.innerText = data.label;
                resultConf.innerText = `Confidence: ${data.confidence}%`;
                
                // set style
                if (data.label === 'PHISHING') {
                    resultLabel.className = 'label phishing';
                } else {
                    resultLabel.className = 'label legit';
                }

                resultDiv.style.display = 'block';
            } catch (err) {
                alert("error contacting server!");
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
